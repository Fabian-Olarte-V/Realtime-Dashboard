<section class="queue-page">
  @if (pollingError$ | async; as error) {
    <div class="error-banner">Error: {{ error }}</div>
  } @else {
    <app-queue-toolbar
      [filters]="(filters$ | async)!"
      (filtersChange)="onFiltersChange($event)"
    ></app-queue-toolbar>

    <div class="layout">
      <section class="panel panel--list">
        <app-ticket-list
          [items]="(items$ | async)!"
          [selectedId]="(selectedId$ | async)!"
          (selectItem)="onSelectItem($event)"
        ></app-ticket-list>
      </section>

      <section class="panel panel--detail">
        <app-ticket-detail
          [item]="(selectedItem$ | async)!"
          [canAssignToMe]="(canAssignToMe$ | async)!"
          [canComplete]="(canComplete$ | async)!"
          [error]="mutationError$ | async"
          (assignToMe)="onAssignToMe()"
          (complete)="onComplete()"
        ></app-ticket-detail>
      </section>
    </div>
  }
</section>
