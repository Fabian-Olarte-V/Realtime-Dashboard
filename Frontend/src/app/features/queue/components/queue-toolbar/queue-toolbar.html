<div class="queue-toolbar">
  <label class="field field--search">
    <span class="field__label">Search Ticket</span>
    <input
      type="text"
      [value]="filters.searchText"
      (input)="onQueryInput($event)"
      placeholder="ID, titulo o descripcion"
    />
  </label>

  <label class="field">
    <span class="field__label">Status</span>
    <select [value]="filters.status" (change)="onStatusChange($event)">
      <option value="ALL">All</option>
      <option value="NEW">NEW</option>
      <option value="IN_PROGRESS">IN_PROGRESS</option>
      <option value="DONE">DONE</option>
      <option value="FAILED">FAILED</option>
    </select>
  </label>

  <label class="field">
    <span class="field__label">Order By</span>
    <select [value]="filters.sort" (change)="onSortChange($event)">
      <option value="createdat">Created Date</option>
      <option value="deadlineat">Updated Date</option>
      <option value="updatedat">Deadline Date</option>
    </select>
  </label>
</div>
